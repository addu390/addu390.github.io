<div class="menu">
    {%- include search.html -%}
    <span class="theme-grade">
        <a id="dark-mode-button" class="theme-trigger" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false" title="Theme">
            <img id="theme-smiley" class="twemoji theme-icon" src="/assets/img/emoji/smiley-light.svg" alt="Theme">
        </a>
        <ul class="theme-grade-menu" hidden>
            <li><button type="button" data-grade="light"><img class="twemoji" src="/assets/img/emoji/smiley-light.svg" alt="">Light</button></li>
            <li><button type="button" data-grade="dim"><img class="twemoji" src="/assets/img/emoji/smiley-dim.svg" alt="">Dim</button></li>
            <li><button type="button" data-grade="dark"><img class="twemoji" src="/assets/img/emoji/smiley-dark.svg" alt="">Dark</button></li>
            <li><button type="button" data-grade="darker"><img class="twemoji" src="/assets/img/emoji/smiley-darker.svg" alt="">Darker</button></li>
        </ul>
    </span>
    <a href="/feed.xml" target="_blank"><img class="svg-icon twemoji rss-icon" src="/assets/img/common/rss.svg"
            alt=""></a>
    <a id="sound-button">
        <img id="icon-sound-on" class="twemoji audio-icon svg-icon" src="/assets/img/common/audio-on.svg" style="display: none;" alt="">
        <img id="icon-sound-off" class="twemoji audio-icon svg-icon" src="/assets/img/common/audio-off.svg" alt="">
    </a>
</div>
