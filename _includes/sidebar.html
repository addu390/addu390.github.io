<aside class="sidebar pure-u-1 pure-u-md-1-5">
    <div class="sidebar-info">
        <span hidden>{{site.title}}</span>
        <div>
            <img title="Start/Stop tear of joy!" id="profile-gif" class="brand-photo"
                src="/{{site.header_image}}" alt="Photo of {{site.author}}" />
        </div>
        <h1 class="brand-title">
            <a href="/"> {{site.title}}</a><img onclick="location.href='/';" title="verified"
                class="clickable-div verified-tag" src="/assets/img/profile/verified.svg"
                alt="Verified Tag" />
        </h1>
        <p></p>
    </div>

    <ul class="sidebar-list">
        <li class="clickable-div" onclick="location.href='/';"><span class="sidebar-index">{% include house-up-icon.svg %}</span>&nbsp; Home</li>
        <li class="clickable-div" onclick="location.href='/journals';"><span
                class="sidebar-index"><img class="twemoji" src="/assets/img/emoji/book.svg"
                    alt="journal"></span>&nbsp;
            Journal</li>
        <li class="clickable-div" onclick="location.href='/contact';"><span
                class="sidebar-index"><img class="twemoji" src="/assets/img/emoji/horn.svg"
                    alt="contact"></span>&nbsp;
            Contact</li>
        <li class="clickable-div" onclick="location.href='/privacy';"><span
                class="sidebar-index"><img class="twemoji" src="/assets/img/emoji/cookie.svg"
                    alt="privacy policy"></span>&nbsp;
            Privacy Policy</li>
        <li class="clickable-div" onclick="location.href='/tags';"><span
                class="sidebar-index"><img class="twemoji" src="/assets/img/emoji/tag.svg"
                    alt="tags"></span>&nbsp;
            Tags</li>
        <li class="clickable-div" onclick="location.href='/archive';"><span
                class="sidebar-index"><img class="twemoji" src="/assets/img/emoji/archive.svg"
                    alt="archive"></span>&nbsp;
            Archive</li>
    </ul>

    <div class="sidebar-footer">
        {%- include sidebar-footer.html -%}
    </div>
</aside>

<script src="{{ '../assets/js/sidebar.js' | relative_url }}"></script>
<script src="{{ '/assets/js/up-balloons.js' | relative_url }}"></script>
