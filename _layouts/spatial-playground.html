---
layout: default
---

<div class="newspaper np-article np-demo">
    {%- include np-running-head.html -%}
    <div class="sp-wrap">
        <div class="np-demo-split">
            <div class="np-demo-side">
                <div class="np-demo-head">
                    <div class="np-demo-title" id="sp-title">Spatial Index Playground</div>
                    <div class="np-demo-desc" id="sp-desc">Pick a structure and start clicking.</div>
                </div>

                <div class="np-tabs">
                    <button class="np-tab is-active" data-structure="kd" type="button">k-d Tree</button>
                    <button class="np-tab" data-structure="quadtree" type="button">Quadtree</button>
                    <button class="np-tab" data-structure="geohash" type="button">Geohash</button>
                    <button class="np-tab" data-structure="hybrid" type="button">Quad-KD</button>
                    <button class="np-tab" data-structure="rkd" type="button">R-KD</button>
                </div>

                <div class="sp-actions">
                    <button class="np-btn" id="sp-random" type="button">Random</button>
                    <button class="np-btn" id="sp-clear" type="button">Clear</button>
                </div>

                <div class="sp-knobs">
                    <div id="sp-knobs-kd">
                        <label class="np-check"><input type="checkbox" id="kd-lines" checked> Partition lines</label>
                        <label class="np-check"><input type="checkbox" id="kd-depth" checked> Colour by depth</label>
                        <label class="np-check"><input type="checkbox" id="kd-nn" checked> Nearest neighbour on hover</label>
                    </div>

                    <div id="sp-knobs-quadtree" hidden>
                        <div class="sp-knob">
                            <label>Cell capacity: <span class="sp-val" id="qt-cap-val">2</span></label>
                            <input type="range" id="qt-cap" min="1" max="8" value="2">
                        </div>
                        <div class="sp-knob">
                            <label>Max depth: <span class="sp-val" id="qt-depth-val">6</span></label>
                            <input type="range" id="qt-depth" min="2" max="8" value="6">
                        </div>
                        <label class="np-check"><input type="checkbox" id="qt-grid" checked> Show subdivisions</label>
                    </div>

                    <div id="sp-knobs-geohash" hidden>
                        <div class="sp-knob">
                            <label>Precision (characters): <span class="sp-val" id="gh-prec-val">3</span></label>
                            <input type="range" id="gh-prec" min="1" max="6" value="3">
                        </div>
                        <label class="np-check"><input type="checkbox" id="gh-labels" checked> Show cell codes</label>
                    </div>

                    <div id="sp-knobs-hybrid" hidden>
                        <div class="sp-knob">
                            <label>Points per cell (bounding box): <span class="sp-val" id="hy-cap-val">6</span></label>
                            <input type="range" id="hy-cap" min="2" max="16" value="6">
                        </div>
                        <div class="sp-knob">
                            <label>Max quadtree depth: <span class="sp-val" id="hy-depth-val">6</span></label>
                            <input type="range" id="hy-depth" min="2" max="8" value="6">
                        </div>
                        <label class="np-check"><input type="checkbox" id="hy-cells" checked> Show quadtree cells</label>
                        <label class="np-check"><input type="checkbox" id="hy-kd" checked> Show k-d partitions</label>
                    </div>

                    <div id="sp-knobs-rkd" hidden>
                        <div class="sp-knob">
                            <label>Points per rectangle: <span class="sp-val" id="rk-cap-val">6</span></label>
                            <input type="range" id="rk-cap" min="2" max="16" value="6">
                        </div>
                        <label class="np-check"><input type="checkbox" id="rk-rects" checked> Show r-tree rectangles</label>
                        <label class="np-check"><input type="checkbox" id="rk-kd" checked> Show k-d partitions</label>
                    </div>

                    <div class="sp-readout" id="sp-readout"><span class="sp-muted">&nbsp;</span></div>
                </div>
            </div>

            <div class="np-demo-main">
                <canvas id="sp-canvas"></canvas>
                <p class="np-hint" id="sp-hint">Click the canvas to add a point.</p>
            </div>
        </div>

        {% include np-demo-related.html href="/hybrid-spatial-index-conclusion" title="Hybrid Spatial Index: Quad-KD and R-KD trees" %}
    </div>
</div>

<script src="{{ '/assets/js/spatial-playground.js' | relative_url }}" defer></script>
