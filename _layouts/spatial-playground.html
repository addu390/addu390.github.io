---
layout: default
---

<div class="newspaper np-article np-demo">
    {%- include np-running-head.html -%}
    <div class="sp-wrap">
        <div class="sp-layout">
            <div class="sp-left">
                <div class="sp-head">
                    <div class="sp-title" id="sp-title">Spatial Index Playground</div>
                    <div class="sp-desc" id="sp-desc">Pick a structure and start clicking.</div>
                </div>

                <div class="sp-tabs">
                    <button class="sp-tab is-active" data-structure="kd" type="button">k-d Tree</button>
                    <button class="sp-tab" data-structure="quadtree" type="button">Quadtree</button>
                    <button class="sp-tab" data-structure="geohash" type="button">Geohash</button>
                </div>

                <div class="sp-actions">
                    <button class="sp-btn" id="sp-random" type="button">Random</button>
                    <button class="sp-btn" id="sp-clear" type="button">Clear</button>
                </div>

                <div class="sp-knobs">
                    <div id="sp-knobs-kd">
                        <label class="sp-check"><input type="checkbox" id="kd-lines" checked> Partition lines</label>
                        <label class="sp-check"><input type="checkbox" id="kd-depth" checked> Colour by depth</label>
                        <label class="sp-check"><input type="checkbox" id="kd-nn" checked> Nearest neighbour on hover</label>
                    </div>

                    <div id="sp-knobs-quadtree" hidden>
                        <div class="sp-knob">
                            <label>Cell capacity: <span class="sp-val" id="qt-cap-val">2</span></label>
                            <input type="range" id="qt-cap" min="1" max="8" value="2">
                        </div>
                        <div class="sp-knob">
                            <label>Max depth: <span class="sp-val" id="qt-depth-val">6</span></label>
                            <input type="range" id="qt-depth" min="2" max="8" value="6">
                        </div>
                        <label class="sp-check"><input type="checkbox" id="qt-grid" checked> Show subdivisions</label>
                    </div>

                    <div id="sp-knobs-geohash" hidden>
                        <div class="sp-knob">
                            <label>Precision (characters): <span class="sp-val" id="gh-prec-val">3</span></label>
                            <input type="range" id="gh-prec" min="1" max="6" value="3">
                        </div>
                        <label class="sp-check"><input type="checkbox" id="gh-labels" checked> Show cell codes</label>
                    </div>

                    <div class="sp-readout" id="sp-readout"><span class="sp-muted">&nbsp;</span></div>
                </div>
            </div>

            <div class="sp-right">
                <canvas id="sp-canvas"></canvas>
                <p class="sp-hint" id="sp-hint">Click the canvas to add a point.</p>
            </div>
        </div>
    </div>
</div>

<script src="{{ '/assets/js/spatial-playground.js' | relative_url }}" defer></script>
