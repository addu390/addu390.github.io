---
layout: default
---
<div class="newspaper np-article np-page">
    {%- include np-running-head.html -%}

    <article class="post-entry np-page-entry" itemscope itemtype="http://schema.org/WebPage">
        <div class="np-kicker np-article-kicker">{{ page.kicker | default: "PyBlog" }}</div>
        <h2 class="post-title np-article-head" itemprop="name headline">{{ page.title | escape }}</h2>
        {%- if page.deck -%}
        <p class="np-article-deck">{{ page.deck }}</p>
        {%- endif -%}

        <div class="post-body np-article-body" itemprop="mainContentOfPage">
            {{ content }}
        </div>
    </article>

    {%- include np-foot-rule.html -%}
</div>
