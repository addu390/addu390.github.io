<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="470px" viewBox="0 0 1000 470"><defs/><g>

<text x="500" y="26" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Compaction scheduling on a backend</text>
<text x="500" y="46" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">a single producer ranks tablets by score and feeds two thread pools</text>

<!-- tablets strip -->
<rect x="24" y="64" width="952" height="68" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="40" y="84" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Tablets on this backend  -  ranked by compaction score</text>
<rect x="40" y="96" width="120" height="28" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="100" y="115" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">t1   42</text>
<rect x="168" y="96" width="120" height="28" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="228" y="115" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">t2   31</text>
<rect x="296" y="96" width="120" height="28" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="356" y="115" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">t3   6</text>
<rect x="424" y="96" width="120" height="28" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="484" y="115" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">t4   3</text>
<rect x="560" y="96" width="396" height="28" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="568" y="115" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="start">skipped:</text>
<text x="644" y="115" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">t5 in a job,   t6 just loaded</text>

<!-- arrow tablets -> producer -->
<path d="M 500 132 L 500 154.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 160 L 496.5 153 L 500 154.75 L 503.5 153 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="516" y="150" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">take the top, skip the busy</text>

<!-- producer box -->
<rect x="160" y="160" width="680" height="118" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="500" y="182" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Producer thread   (wakes every 100 ms)</text>

<rect x="176" y="206" width="150" height="52" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="251" y="228" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">rank by score</text>
<text x="251" y="246" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">skip busy ones</text>

<path d="M 326 232 L 344.75 232" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 350 232 L 343 235.5 L 344.75 232 L 343 228.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<rect x="350" y="206" width="150" height="52" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="425" y="228" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">pick the kind</text>
<text x="425" y="246" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">9 cumu : 1 base</text>

<path d="M 500 232 L 518.75 232" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 524 232 L 517 235.5 L 518.75 232 L 517 228.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<rect x="524" y="206" width="156" height="52" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="602" y="228" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">gate: free slots</text>
<text x="602" y="246" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">cap(8) - in flight</text>

<path d="M 680 232 L 694.75 232" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 700 232 L 693 235.5 L 694.75 232 L 693 228.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<rect x="700" y="206" width="124" height="52" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="762" y="228" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">submit</text>
<text x="762" y="246" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">1 job / tablet</text>

<!-- arrow producer -> cumu pool -->
<path d="M 300 278 L 300 324.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 300 330 L 296.5 323 L 300 324.75 L 303.5 323 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="316" y="302" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">cumulative (9 of 10 rounds)</text>

<!-- arrow producer -> base pool -->
<path d="M 700 278 L 700 324.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 700 330 L 696.5 323 L 700 324.75 L 703.5 323 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="684" y="302" fill="#000000" font-family="monospace" font-size="12px" text-anchor="end">base (1 of 10 rounds)</text>

<!-- cumulative pool -->
<rect x="120" y="330" width="360" height="96" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<rect x="120" y="330" width="360" height="26" fill="#fff2cc" stroke="#000000" pointer-events="all"/>
<text x="300" y="348" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Cumulative pool</text>
<text x="136" y="376" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">threads: cores x 0.5, up to 20</text>
<text x="136" y="398" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">queue  ->  workers  ->  merge</text>
<text x="136" y="418" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">small rowsets above the point</text>

<!-- base pool -->
<rect x="520" y="330" width="360" height="96" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<rect x="520" y="330" width="360" height="26" fill="#fff2cc" stroke="#000000" pointer-events="all"/>
<text x="700" y="348" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Base pool</text>
<text x="536" y="376" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">threads: 4</text>
<text x="536" y="398" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">queue  ->  workers  ->  merge</text>
<text x="536" y="418" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">+ full compaction, on demand</text>

<!-- caption -->
<text x="500" y="448" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Each job then acquires a lease, merges, and commits (next).</text>
<text x="500" y="466" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">The backend chooses tablets by score. The Meta Service only arbitrates the lease.</text>

</g></svg>
