<text x="500" y="340" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Stream Load is the high-throughput path, an HTTP batch a backend coordinates, used by Flink and Spark.</text>
<text x="500" y="360" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">A two-phase variant commits on the next checkpoint for exactly-once. The rest differ only at the entry.</text>

