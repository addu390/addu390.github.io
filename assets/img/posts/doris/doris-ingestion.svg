<text x="668" y="142" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">1  begin one labeled transaction</text>
<text x="668" y="164" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">2  a backend builds immutable</text>
<text x="668" y="186" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">      segments in the vault</text>
<text x="668" y="208" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">3  commit at the Meta Service</text>
<text x="668" y="230" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">4  partition advances a version</text>
<text x="668" y="274" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">the label makes the batch atomic</text>
<text x="668" y="296" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">and dedupes a retried load</text>
