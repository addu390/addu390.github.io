<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="420px" viewBox="0 0 1000 420"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">One writer, replicated: the catalog and its journal</text>

<!-- client write -->
<rect x="24" y="105" width="186" height="48" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="117" y="134" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">DDL / metadata write</text>

<!-- master container -->
<rect x="280" y="64" width="340" height="290" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="296" y="86" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Frontend - master (sole writer)</text>

<rect x="300" y="100" width="300" height="58" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="450" y="124" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Catalog (Env)</text>
<text x="450" y="146" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">dbs, tables, partitions</text>

<rect x="300" y="178" width="300" height="58" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="450" y="202" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Edit-log journal (local disk)</text>
<text x="450" y="224" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">append-only OP entries, BDB JE</text>

<rect x="300" y="262" width="300" height="58" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="450" y="286" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Image / checkpoint</text>
<text x="450" y="308" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">folds journal, frees old entries</text>

<!-- follower / observer -->
<rect x="720" y="96" width="230" height="80" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="835" y="122" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Frontend - follower</text>
<text x="835" y="144" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">replays journal</text>
<text x="835" y="164" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">votes, electable</text>

<rect x="720" y="212" width="230" height="80" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="835" y="238" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Frontend - observer</text>
<text x="835" y="260" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">replays journal</text>
<text x="835" y="280" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">read scale-out</text>

<!-- client -> master -->
<path d="M 210 129 L 294.75 129" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 300 129 L 293 125.5 L 294.75 129 L 293 132.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="255" y="121" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">write</text>

<!-- catalog -> journal -->
<path d="M 450 158 L 450 172.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 450 178 L 446.5 171 L 450 172.75 L 453.5 171 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="462" y="171" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">append</text>

<!-- journal -> checkpoint -->
<path d="M 380 236 L 380 256.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 380 262 L 376.5 255 L 380 256.75 L 383.5 255 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="392" y="252" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">fold</text>

<!-- replicate -->
<path d="M 620 207 L 670 207" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 670 136 L 670 252" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 670 136 L 714.75 136" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 720 136 L 713 132.5 L 714.75 136 L 713 139.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 670 252 L 714.75 252" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 720 252 L 713 248.5 L 714.75 252 L 713 255.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="676" y="192" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">replicate + replay</text>

<!-- forward writes (follower -> master, over the top) -->
<path d="M 835 96 L 835 52 L 450 52 L 450 58.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 450 64 L 446.5 57 L 450 58.75 L 453.5 57 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="640" y="46" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">forward writes to master</text>

<!-- caption -->
<text x="500" y="384" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Only the master appends to the journal. Followers and observers replay it, so any of them can serve reads.</text>
<text x="500" y="404" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">A write landing on a non-master is forwarded to the master, and a follower can be elected if the master fails.</text>

</g></svg>
