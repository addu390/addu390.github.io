<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="552px" viewBox="0 0 1000 552"><defs/><g>
<text x="500" y="26" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Life of a row: one key through the storage engine</text>
<rect x="40" y="44" width="920" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="52" y="69" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Operation:</text>
<text x="168" y="69" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">DELETE WHERE sale_date = 01-05</text>
<rect x="40" y="100" width="230" height="80" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="155" y="124" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">MemTable</text>
<text x="155" y="143" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">(sort by key)</text>
<text x="155" y="165" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">01-05  del-sign=1</text>
<path d="M 155 180 L 155 204.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 155 210 L 151.5 203 L 155 204.75 L 158.5 203 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="167" y="199" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">flush</text>
<text x="300" y="118" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">bucket: store_id = 7</text>
<text x="300" y="138" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">key = sale_date,  value = amount</text>
<text x="300" y="158" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">model: Unique (merge-on-write)</text>
<rect x="40" y="210" width="920" height="210" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="54" y="230" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Tablet 10001</text>
<rect x="56" y="244" width="170" height="26" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="141.0" y="263" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">v[2-2]</text>
<rect x="56" y="270" width="170" height="134" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="68" y="289" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">segment</text>
<text x="72" y="313" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">01-02 = 10</text>
<path d="M 70 309 L 176 309" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<text x="72" y="335" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">01-05 = 20</text>
<path d="M 70 331 L 176 331" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<text x="68" y="362" fill="#b85450" font-family="monospace" font-size="12px" text-anchor="start">bitmap: 1 1</text>
<text x="68" y="384" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">idx: zone / key / inv</text>
<rect x="238" y="244" width="170" height="26" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="323.0" y="263" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">v[3-3]</text>
<rect x="238" y="270" width="170" height="134" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="250" y="289" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">segment</text>
<text x="254" y="313" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">01-02 = 15</text>
<text x="254" y="335" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">01-09 = 30</text>
<text x="250" y="362" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">bitmap: 0 0</text>
<text x="250" y="384" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">idx: zone / key / inv</text>
<rect x="420" y="244" width="170" height="26" fill="#fff2cc" stroke="#000000" pointer-events="all"/>
<text x="505.0" y="263" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">v[4-4]</text>
<rect x="420" y="270" width="170" height="134" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="432" y="289" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">tombstone</text>
<text x="436" y="313" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">01-05  del</text>
<text x="432" y="362" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">bitmap: -</text>
<text x="432" y="384" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">idx: -</text>
<rect x="784" y="244" width="160" height="26" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="864" y="263" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">PK index</text>
<rect x="784" y="270" width="160" height="134" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="794" y="292" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">01-02 -> v3:0</text>
<text x="794" y="316" fill="#b85450" font-family="monospace" font-size="12px" text-anchor="start">01-05 -> (del)</text>
<text x="794" y="340" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">01-09 -> v3:1</text>
<rect x="40" y="436" width="920" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="52" y="461" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">A read returns:</text>
<text x="210" y="461" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">01-02=15, 01-09=30</text>
<rect x="770" y="442" width="180" height="28" fill="#fff2cc" stroke="#000000" pointer-events="all"/>
<text x="860" y="461" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">score: 3</text>
<text x="500" y="502" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Step 4 / 9 - a delete writes a tombstone in v[4-4] and marks the live 01-05 in v[2-2]'s bitmap</text>

</g></svg>
