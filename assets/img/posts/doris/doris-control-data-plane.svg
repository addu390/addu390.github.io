<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="720px" height="340px" viewBox="0 0 720 340"><defs/><g>
<!-- left panel: control plane -->
<rect x="30" y="40" width="320" height="280" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="190" y="68" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">CONTROL PLANE</text>
<text x="190" y="88" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">FE - journaled - low volume</text>
<rect x="50" y="110" width="280" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="190" y="134" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">DDL &amp; catalog metadata</text>
<rect x="50" y="160" width="280" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="190" y="184" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">txns: begin / commit / publish</text>
<rect x="50" y="210" width="280" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="190" y="234" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">scheduling, repair, rebalance</text>
<rect x="50" y="260" width="280" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="190" y="284" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">heartbeats &amp; membership</text>
<!-- right panel: data plane -->
<rect x="370" y="40" width="320" height="280" fill="#f8cecc" stroke="#000000" pointer-events="all"/>
<text x="530" y="68" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">DATA PLANE</text>
<text x="530" y="88" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">BE - never journaled - high volume</text>
<rect x="390" y="110" width="280" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="530" y="134" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">scan columns off local disk</text>
<rect x="390" y="160" width="280" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="530" y="184" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">shuffle data blocks BE - BE</text>
<rect x="390" y="210" width="280" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="530" y="234" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">stream load data into memtables</text>
<rect x="390" y="260" width="280" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="530" y="284" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">return rows / Arrow batches</text>
</g></svg>
