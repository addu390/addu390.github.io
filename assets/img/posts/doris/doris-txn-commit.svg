<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="500px" viewBox="0 0 1000 500"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Committing a load</text>

<!-- actors -->
<rect x="60" y="50" width="200" height="48" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="160" y="79" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Backend (BE)</text>
<rect x="420" y="50" width="200" height="48" fill="#e1d5e7" stroke="#000000" pointer-events="all"/>
<text x="520" y="79" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Meta Service</text>
<rect x="760" y="50" width="180" height="48" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="850" y="79" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage Vault</text>

<!-- lifelines -->
<path d="M 160 98 L 160 300" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 520 98 L 520 305" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 850 98 L 850 220" fill="none" stroke="#000000" stroke-miterlimit="10"/>

<!-- 1 begin_txn -->
<path d="M 160 126 L 514.75 126" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 520 126 L 513 129.5 L 514.75 126 L 513 122.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="340" y="118" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">1  begin_txn</text>

<!-- return txn 88 -->
<path d="M 520 154 L 165.25 154" fill="none" stroke="#000000" stroke-miterlimit="10" stroke-dasharray="4 4"/>
<path d="M 160 154 L 167 150.5 L 165.25 154 L 167 157.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<rect x="300" y="143" width="80" height="22" fill="#fff2cc" stroke="#000000" pointer-events="all"/>
<text x="340" y="158" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">txn 88</text>

<!-- 2 write segments (data plane) -->
<path d="M 160 196 L 844.75 196" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 850 196 L 843 199.5 L 844.75 196 L 843 192.5 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="470" y="188" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="middle">2  write segments</text>

<!-- 3 prepare_rowset -->
<path d="M 160 240 L 514.75 240" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 520 240 L 513 243.5 L 514.75 240 L 513 236.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="340" y="232" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">3  prepare_rowset</text>
<text x="340" y="258" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">temp rowset, txn 88, not yet visible</text>

<!-- 4 commit_txn -->
<path d="M 160 292 L 514.75 292" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 520 292 L 513 295.5 L 514.75 292 L 513 288.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="340" y="284" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">4  commit_txn</text>

<!-- commit transaction box -->
<rect x="300" y="320" width="440" height="118" fill="#f0eaf3" stroke="#000000" pointer-events="all"/>
<text x="520" y="344" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">commit_txn = one FoundationDB transaction</text>
<text x="320" y="372" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">read partition version  3</text>
<text x="320" y="398" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">temp rowset  ->  rowset (10001, v4)  [4,4]</text>
<text x="320" y="424" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">partition version  3 -> 4,  txn 88 visible</text>

<!-- caption -->
<text x="500" y="470" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Until commit, the rowset's bytes already sit in the vault but no version points at them.</text>
<text x="500" y="490" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Commit flips one version atomically, and the whole load becomes visible at once.</text>

</g></svg>
