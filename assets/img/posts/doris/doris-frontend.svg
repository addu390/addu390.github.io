<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="510px" viewBox="0 0 1000 510"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Frontend: front door, catalog, planner, and coordinator</text>

<!-- client -->
<rect x="368" y="44" width="264" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="500" y="68" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">MySQL / Arrow Flight client</text>

<!-- FE container -->
<rect x="120" y="110" width="760" height="150" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="136" y="132" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Frontend (master / follower / observer)</text>

<!-- FE sub-boxes -->
<rect x="140" y="146" width="166" height="96" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="223" y="174" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Front door</text>
<text x="223" y="202" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">MySQL protocol</text>
<text x="223" y="224" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Arrow Flight SQL</text>

<rect x="327" y="146" width="166" height="96" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="410" y="174" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Catalog (Env)</text>
<text x="410" y="202" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">in-memory graph</text>
<text x="410" y="224" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">+ journal on disk</text>

<rect x="514" y="146" width="166" height="96" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="597" y="174" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Nereids planner</text>
<text x="597" y="202" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">parse, optimize,</text>
<text x="597" y="224" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">split to fragments</text>

<rect x="701" y="146" width="166" height="96" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="784" y="174" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Coordinator</text>
<text x="784" y="202" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">place + dispatch</text>
<text x="784" y="224" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">collect results</text>

<!-- meta service -->
<rect x="120" y="300" width="300" height="64" fill="#e1d5e7" stroke="#000000" pointer-events="all"/>
<text x="270" y="326" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Meta Service</text>
<text x="270" y="348" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">topology + snapshot version</text>

<!-- backends -->
<rect x="580" y="300" width="300" height="64" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="730" y="336" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Backends (compute group)</text>

<!-- vault -->
<rect x="120" y="404" width="760" height="52" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="500" y="434" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage vault - one durable copy</text>

<!-- client <-> FE -->
<path d="M 500 89.25 L 500 104.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 84 L 496.5 91 L 500 89.25 L 503.5 91 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 110 L 496.5 103 L 500 104.75 L 503.5 103 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="512" y="101" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">SQL / results</text>

<!-- FE -> MS -->
<path d="M 300 260 L 300 294.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 300 300 L 296.5 293 L 300 294.75 L 303.5 293 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="312" y="285" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">topology + version</text>

<!-- FE <-> BE -->
<path d="M 700 265.25 L 700 294.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 700 260 L 696.5 267 L 700 265.25 L 703.5 267 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 700 300 L 696.5 293 L 700 294.75 L 703.5 293 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="688" y="285" fill="#000000" font-family="monospace" font-size="14px" text-anchor="end">fragments / results</text>

<!-- BE <-> vault (data plane) -->
<path d="M 700 369.25 L 700 398.75" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 700 364 L 696.5 371 L 700 369.25 L 703.5 371 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 700 404 L 696.5 397 L 700 398.75 L 703.5 397 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="712" y="388" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="start">read / write</text>

<!-- caption -->
<text x="500" y="478" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">The Frontend owns the catalog and the plan. It reads topology and the read version from the Meta Service,</text>
<text x="500" y="498" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">hands fragments to the backends, and streams results back, never touching the data in the vault itself.</text>

</g></svg>
