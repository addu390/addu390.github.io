<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="500px" viewBox="0 0 1000 500"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Backend: stateless compute over the vault</text>

<!-- FE -->
<rect x="70" y="54" width="300" height="54" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="220" y="80" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Frontend (FE)</text>
<text x="220" y="99" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">plans queries</text>

<!-- Meta Service -->
<rect x="630" y="54" width="300" height="54" fill="#e1d5e7" stroke="#000000" pointer-events="all"/>
<text x="780" y="80" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Meta Service</text>
<text x="780" y="99" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">metadata + leases</text>

<!-- Compute group container -->
<rect x="70" y="160" width="860" height="190" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="85" y="181" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Compute group - stateless, interchangeable BEs</text>

<!-- BE 1 detailed -->
<rect x="95" y="198" width="340" height="140" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="265" y="222" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Backend (BE 1)</text>
<text x="265" y="242" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">stateless, no durable data</text>
<rect x="103" y="258" width="104" height="64" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="155" y="294" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Serve reads</text>
<rect x="215" y="258" width="104" height="64" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="267" y="294" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">File cache</text>
<rect x="327" y="258" width="104" height="64" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="379" y="294" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Compaction</text>

<!-- BE 2 -->
<rect x="470" y="198" width="200" height="140" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="570" y="272" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Backend (BE 2)</text>

<!-- BE 3 -->
<rect x="700" y="198" width="210" height="140" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="805" y="272" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Backend (BE 3)</text>

<!-- Storage Vault -->
<rect x="70" y="400" width="860" height="60" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="500" y="436" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage Vault - the only durable copy</text>

<!-- FE -> BE1 -->
<path d="M 220 108 L 220 192.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 220 198 L 216.5 191 L 220 192.75 L 223.5 191 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="232" y="152" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">plan fragments</text>

<!-- MS -> BE3 -->
<path d="M 790 108 L 804 192.9" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 805 198 L 800.4 191.6 L 804 193 L 807.5 191.2 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="788" y="152" fill="#000000" font-family="monospace" font-size="14px" text-anchor="end">metadata + leases</text>

<!-- Vault <-> BE1 (data plane) -->
<path d="M 265 343.25 L 265 394.75" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 265 400 L 261.5 393 L 265 394.75 L 268.5 393 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 265 338 L 261.5 345 L 265 343.25 L 268.5 345 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="277" y="376" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="start">data, cached locally</text>

<!-- caption -->
<text x="500" y="486" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Every BE holds no durable data, only a local cache of the vault, so backends can be added or dropped freely.</text>

</g></svg>
