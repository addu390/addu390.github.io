<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="440px" viewBox="0 0 1000 440"><defs/><g>

<!-- Tablet container -->
<rect x="40" y="40" width="640" height="372" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="360" y="64" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Tablet</text>
<text x="360" y="84" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">one bucket of the table, one copy in the vault</text>

<!-- Rowset v[0-1] initial -->
<rect x="60" y="100" width="600" height="56" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="76" y="128" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Rowset  v[0-1]</text>
<text x="76" y="146" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">initial, empty</text>

<!-- Rowset v[2-2] -->
<rect x="60" y="172" width="600" height="56" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="76" y="200" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Rowset  v[2-2]</text>
<text x="76" y="218" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">from a load</text>
<rect x="330" y="188" width="70" height="24" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="365" y="205" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">seg 0</text>
<rect x="410" y="188" width="70" height="24" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="445" y="205" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">seg 1</text>

<!-- Rowset v[3-3] -->
<rect x="60" y="244" width="600" height="56" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="76" y="272" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Rowset  v[3-3]</text>
<text x="76" y="290" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">from a load</text>
<rect x="330" y="260" width="70" height="24" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="365" y="277" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">seg 0</text>

<!-- Rowset v[4-4] -->
<rect x="60" y="316" width="600" height="56" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="76" y="344" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Rowset  v[4-4]</text>
<text x="76" y="362" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">from a load</text>
<rect x="330" y="332" width="70" height="24" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="365" y="349" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">seg 0</text>
<rect x="410" y="332" width="70" height="24" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="445" y="349" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">seg 1</text>
<rect x="490" y="332" width="70" height="24" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="525" y="349" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">seg 2</text>

<!-- annotations -->
<text x="710" y="118" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">A load appends one</text>
<text x="710" y="136" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">new rowset. The older</text>
<text x="710" y="154" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">ones are never edited.</text>

<text x="710" y="196" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Each rowset covers a</text>
<text x="710" y="214" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">version range.</text>

<text x="710" y="262" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">A read merges rowsets</text>
<text x="710" y="280" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">up to a chosen version.</text>

<text x="710" y="328" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Each segment is one</text>
<text x="710" y="346" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">columnar file.</text>

</g></svg>
