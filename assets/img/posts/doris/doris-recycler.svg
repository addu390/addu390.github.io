<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="384px" viewBox="0 0 1000 384"><defs/><g>

<text x="500" y="26" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Space reclamation: the recycler</text>
<text x="500" y="46" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">expired entries drive deletes from the vault, then the entry itself is removed</text>

<!-- Recycler -->
<rect x="60" y="78" width="280" height="96" fill="#fff2cc" stroke="#000000" pointer-events="all"/>
<text x="200" y="102" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Recycler</text>
<path d="M 60 110 L 340 110" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<text x="200" y="134" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">runs periodically,</text>
<text x="200" y="156" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">skips entries not yet expired</text>

<!-- Meta Service -->
<rect x="660" y="78" width="280" height="96" fill="#e1d5e7" stroke="#000000" pointer-events="all"/>
<text x="800" y="102" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Meta Service</text>
<path d="M 660 110 L 940 110" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<text x="676" y="132" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">recycle entries:</text>
<rect x="676" y="142" width="248" height="26" fill="#f0eaf3" stroke="#000000" pointer-events="all"/>
<text x="800" y="160" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">rowset r14   expires T</text>

<!-- Recycler -> MS : scan -->
<path d="M 340 122 L 654.75 122" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 660 122 L 653 118.5 L 654.75 122 L 653 125.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="500" y="112" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">1  scan recycle entries</text>

<!-- Recycler -> MS : remove -->
<path d="M 340 152 L 654.75 152" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 660 152 L 653 148.5 L 654.75 152 L 653 155.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="500" y="168" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">3  remove the entry</text>

<!-- Recycler -> Vault : delete (semantic red) -->
<path d="M 150 174 L 150 258.75" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 150 264 L 146.5 257 L 150 258.75 L 153.5 257 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="166" y="218" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="start">2  delete files</text>

<!-- Storage Vault -->
<rect x="60" y="264" width="880" height="100" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="78" y="286" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Storage Vault</text>

<rect x="100" y="300" width="180" height="40" fill="#f8cecc" stroke="#000000" pointer-events="all"/>
<text x="190" y="324" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">10001/r12_*.dat</text>
<rect x="300" y="300" width="180" height="40" fill="#f8cecc" stroke="#000000" pointer-events="all"/>
<text x="390" y="324" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">10001/r13_*.dat</text>
<rect x="500" y="300" width="180" height="40" fill="#f8cecc" stroke="#000000" pointer-events="all"/>
<text x="590" y="324" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">10001/r14_*.dat</text>
<text x="390" y="356" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="middle">orphaned files, deleted once expired</text>

<rect x="720" y="300" width="180" height="40" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="810" y="324" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">10001/r15_*.dat</text>
<text x="810" y="356" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">live rowset, kept</text>

</g></svg>
