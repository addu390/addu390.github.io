<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="490px" viewBox="0 0 1000 490"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Read path: a fragment scans a consistent snapshot</text>

<!-- pipeline row -->
<rect x="60" y="54" width="200" height="56" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="160" y="80" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Plan fragment</text>
<text x="160" y="99" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">(from FE)</text>

<rect x="290" y="54" width="200" height="56" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="390" y="86" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Scan operator</text>

<rect x="520" y="54" width="200" height="56" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="620" y="86" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Aggregate / Join</text>

<rect x="750" y="54" width="200" height="56" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="850" y="86" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Exchange -&gt; FE</text>

<path d="M 260 82 L 284.75 82" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 290 82 L 283 85.5 L 284.75 82 L 283 78.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 490 82 L 514.75 82" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 520 82 L 513 85.5 L 514.75 82 L 513 78.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 720 82 L 744.75 82" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 750 82 L 743 85.5 L 744.75 82 L 743 78.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<!-- drill down arrow -->
<path d="M 390 110 L 390 154.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 390 160 L 386.5 153 L 390 154.75 L 393.5 153 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<!-- scan internals container -->
<rect x="120" y="160" width="600" height="270" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="140" y="184" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Inside the scan operator</text>

<rect x="140" y="196" width="560" height="44" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="155" y="223" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">1. Sync rowset list for snapshot version v</text>
<rect x="140" y="252" width="560" height="44" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="155" y="279" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">2. Capture rowsets covering v:  [0-1] [2-2] [3-4]</text>
<rect x="140" y="308" width="560" height="44" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="155" y="335" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">3. Prune (zone map, short key, inverted), read columns</text>
<rect x="140" y="364" width="560" height="44" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="155" y="391" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">4. Merge rowsets by table model (dup / agg / unique)</text>

<path d="M 420 240 L 420 246.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 420 252 L 416.5 245 L 420 246.75 L 423.5 245 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 420 296 L 420 302.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 420 308 L 416.5 301 L 420 302.75 L 423.5 301 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 420 352 L 420 358.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 420 364 L 416.5 357 L 420 358.75 L 423.5 357 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<!-- right column: MS, file cache, vault -->
<rect x="770" y="196" width="180" height="44" fill="#e1d5e7" stroke="#000000" pointer-events="all"/>
<text x="860" y="223" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Meta Service</text>
<rect x="770" y="308" width="180" height="44" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="860" y="335" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">File cache</text>
<rect x="770" y="372" width="180" height="44" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="860" y="399" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage Vault</text>

<!-- step1 -> MS -->
<path d="M 700 218 L 764.75 218" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 770 218 L 763 221.5 L 764.75 218 L 763 214.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="762" y="211" fill="#000000" font-family="monospace" font-size="14px" text-anchor="end">get_rowset</text>

<!-- step3 -> file cache -->
<path d="M 700 330 L 764.75 330" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 770 330 L 763 333.5 L 764.75 330 L 763 326.5 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="735" y="323" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="middle">columns</text>

<!-- file cache -> vault -->
<path d="M 860 352 L 860 366.75" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 860 372 L 856.5 365 L 860 366.75 L 863.5 365 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="872" y="366" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="start">miss</text>

<!-- caption -->
<text x="500" y="458" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">The scan fixes a version, syncs that rowset list from the Meta Service, and reads only the covering rowsets.</text>
<text x="500" y="478" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Segment indexes prune what it touches, the file cache serves the bytes, and the table model reconciles rows.</text>

</g></svg>
