<text x="535" y="176" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">tablet_writer_add_block</text>
<text x="535" y="200" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">open_load_stream (load)</text>
<text x="535" y="224" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">merge_filter / apply_filter</text>
<text x="535" y="248" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">fold_constant_expr, lookups</text>
