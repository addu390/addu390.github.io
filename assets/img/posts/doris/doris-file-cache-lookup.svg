<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="528px" viewBox="0 0 1000 528"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">How the cache resolves a read</text>

<!-- request -->
<rect x="60" y="46" width="560" height="86" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="78" y="72" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Scan: read [a, b) of segment  r5_0.dat  at version v</text>
<text x="78" y="94" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">the snapshot version and rowset list name the file and range</text>
<text x="78" y="116" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">the range is aligned to 1 MiB blocks  B0 .. B3</text>

<!-- request -> index -->
<path d="M 340 132 L 340 154.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 340 160 L 336.5 153 L 340 154.75 L 343.5 153 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="352" y="149" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">look up each block</text>

<!-- index -->
<rect x="60" y="160" width="520" height="212" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="78" y="184" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Cache block index (in memory)    key = hash(r5_0.dat)</text>
<rect x="78" y="194" width="484" height="38" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="92" y="218" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">+0 MiB    B0    present   -&gt;  local file</text>
<rect x="78" y="236" width="484" height="38" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="92" y="260" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">+1 MiB    B1    absent    -&gt;  fetch S3</text>
<rect x="78" y="278" width="484" height="38" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="92" y="302" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">+2 MiB    B2    present   -&gt;  local file</text>
<rect x="78" y="320" width="484" height="38" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="92" y="344" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">+3 MiB    B3    absent    -&gt;  fetch S3</text>

<!-- local disk -->
<rect x="640" y="160" width="300" height="110" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="658" y="184" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Local disk (cached blocks)</text>
<rect x="660" y="196" width="120" height="40" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="720" y="220" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B0 bytes</text>
<rect x="800" y="196" width="120" height="40" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="860" y="220" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B2 bytes</text>
<text x="658" y="258" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">B1, B3 added after fetch</text>

<!-- S3 -->
<rect x="640" y="300" width="300" height="72" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="658" y="324" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">S3 / vault</text>
<rect x="660" y="334" width="260" height="30" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="790" y="354" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">r5_0.dat  (immutable)</text>

<!-- index -> local (hit) -->
<path d="M 580 210 L 634.75 210" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 640 210 L 633 213.5 L 634.75 210 L 633 206.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="588" y="203" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">hit</text>

<!-- index -> S3 (miss) -->
<path d="M 580 300 L 634.3 326.4" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 640 329 L 632.2 327.8 L 634.3 326.4 L 634.9 323.9 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="588" y="294" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="start">miss</text>

<!-- S3 -> local (populate) -->
<path d="M 790 300 L 790 275.25" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 790 270 L 786.5 277 L 790 275.25 L 793.5 277 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="802" y="290" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="start">write, mark present</text>

<!-- captions -->
<text x="500" y="470" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">The cache's block index, not the table metadata, decides which blocks are local.</text>
<text x="500" y="490" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Table metadata only names the file and range, and r5_0.dat is immutable, so a present block matches the source.</text>
<text x="500" y="510" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Misses are fetched once, written to disk, and stitched with the local blocks in order.</text>

</g></svg>
