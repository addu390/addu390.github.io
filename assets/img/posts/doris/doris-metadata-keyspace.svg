<text x="739" y="116" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">protobuf value</text>

<!-- table header -->
<text x="70" y="174" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Key   (instance omitted)</text>
