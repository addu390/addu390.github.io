<text x="739" y="83" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">RowsetMetaCloudPB</text>

<!-- anatomy labels -->
<text x="100" y="116" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">keyspace</text>
<text x="182" y="116" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">family</text>
<text x="274" y="116" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">instance</text>
<text x="372" y="116" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">kind</text>
<text x="476" y="116" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">tablet</text>
