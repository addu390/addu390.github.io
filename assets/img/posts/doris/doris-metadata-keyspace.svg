<text x="70" y="214" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">storage_vault   vault 7</text>
<text x="470" y="214" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">StorageVaultPB</text>

<text x="70" y="240" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">version partition   db tbl part</text>
<text x="470" y="240" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">VersionPB</text>

<text x="70" y="266" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">meta tablet   tbl idx part 10001</text>
<text x="470" y="266" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">TabletMetaCloudPB</text>

<text x="70" y="300" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">meta rowset   10001  v2</text>
<text x="470" y="300" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">RowsetMetaCloudPB</text>

<text x="70" y="326" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">meta rowset   10001  v3</text>
<text x="470" y="326" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">RowsetMetaCloudPB</text>

<text x="70" y="352" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">meta rowset   10001  v4</text>
<text x="470" y="352" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">RowsetMetaCloudPB</text>

<text x="70" y="386" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">stats tablet   tbl idx part 10001</text>
<text x="470" y="386" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">TabletStatsPB</text>

<text x="70" y="412" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">txn txn_info   db txn</text>
<text x="470" y="412" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">TxnInfoPB</text>

