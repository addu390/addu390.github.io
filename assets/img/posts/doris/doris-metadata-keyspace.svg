<text x="470" y="438" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">RecycleRowsetPB</text>

<!-- version-chain brace + label -->
<path d="M 636 282 L 636 356" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 636 282 L 644 282" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 636 356 L 644 356" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<text x="652" y="314" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">one range scan returns</text>
<text x="652" y="334" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">the whole version chain</text>

<!-- caption -->
<text x="500" y="486" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Keys are sorted, so related metadata sits together: a tablet's rowsets form one contiguous</text>
<text x="500" y="506" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">range, and dropping a table is deleting a key prefix.</text>

</g></svg>
