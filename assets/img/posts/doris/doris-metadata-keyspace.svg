<path d="M 62 184 L 844 184" fill="none" stroke="#000000" stroke-miterlimit="10"/>

<!-- version-chain highlight band behind rowset rows -->
<rect x="62" y="280" width="566" height="78" fill="#eaf3e9" stroke="none" pointer-events="all"/>

