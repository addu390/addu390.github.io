<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="478px" viewBox="0 0 1000 478"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">File cache: block-based reads over the vault</text>

<text x="140" y="54" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">A scan reads a byte range, split into 1 MiB blocks:</text>

<!-- block strip -->
<rect x="140" y="70" width="150" height="46" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="215" y="91" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B0</text>
<text x="215" y="109" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">hit</text>
<rect x="320" y="70" width="150" height="46" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="395" y="91" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B1</text>
<text x="395" y="109" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">miss</text>
<rect x="500" y="70" width="150" height="46" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="575" y="91" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B2</text>
<text x="575" y="109" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">hit</text>
<rect x="680" y="70" width="150" height="46" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="755" y="91" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B3</text>
<text x="755" y="109" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">miss</text>

<!-- strip -> cache -->
<path d="M 500 116 L 500 164.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 170 L 496.5 163 L 500 164.75 L 503.5 163 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="512" y="147" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">look up each block</text>

<!-- file cache -->
<rect x="120" y="170" width="760" height="120" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="140" y="192" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">BE file cache (local disk)</text>
<text x="140" y="212" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">blocks keyed by hash(file) + offset, cold blocks evicted by typed LRU queues</text>
<rect x="155" y="230" width="120" height="40" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="215" y="255" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B0</text>
<rect x="335" y="230" width="120" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="395" y="255" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B1</text>
<rect x="515" y="230" width="120" height="40" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="575" y="255" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B2</text>
<rect x="695" y="230" width="120" height="40" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="755" y="255" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">B3</text>

<!-- vault -->
<rect x="120" y="360" width="760" height="60" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="500" y="396" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage Vault (durable, holds every block)</text>

<!-- miss fetch B1 -->
<path d="M 395 295.25 L 395 354.75" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 395 360 L 391.5 353 L 395 354.75 L 398.5 353 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 395 290 L 391.5 297 L 395 295.25 L 398.5 297 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<!-- miss fetch B3 -->
<path d="M 755 295.25 L 755 354.75" fill="none" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 755 360 L 751.5 353 L 755 354.75 L 758.5 353 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<path d="M 755 290 L 751.5 297 L 755 295.25 L 758.5 297 Z" fill="#b85450" stroke="#b85450" stroke-miterlimit="10"/>
<text x="380" y="328" fill="#b85450" font-family="monospace" font-size="14px" text-anchor="end">miss: fetch from vault</text>

<!-- caption -->
<text x="500" y="442" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Hits read straight from local disk. A miss fetches the block once, fills the cache, then serves it.</text>
<text x="500" y="462" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Later reads of the same block are local, and a missing block can also come from a peer backend.</text>

</g></svg>
