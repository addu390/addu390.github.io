<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="200px" viewBox="0 0 1000 200"><defs/><g>

<text x="500" y="24" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Compaction score: how many sorted runs a read must merge</text>
<text x="500" y="44" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">a rowset scores 1 if its segments are sorted, or its segment count if a load left them overlapping</text>

<text x="301" y="62" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">cumulative point</text>
<text x="800" y="62" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">older  -&gt;  newer  (version)</text>

<path d="M 301 66 L 301 152" fill="none" stroke="#000000" stroke-miterlimit="10" stroke-dasharray="4 4"/>

<rect x="70" y="86" width="220" height="60" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="180" y="112" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">base v[0-10]</text>
<text x="180" y="132" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">1 run (base score)</text>

<rect x="312" y="86" width="84" height="60" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="354" y="112" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">v[11]</text>
<text x="354" y="132" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">1 seg = 1</text>

<rect x="406" y="86" width="84" height="60" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="448" y="112" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">v[12]</text>
<text x="448" y="132" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">1 seg = 1</text>

<rect x="500" y="86" width="84" height="60" fill="#fff2cc" stroke="#000000" pointer-events="all"/>
<text x="542" y="112" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">v[13]</text>
<text x="542" y="132" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">3 segs = 3</text>

<rect x="594" y="86" width="84" height="60" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="636" y="112" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">v[14]</text>
<text x="636" y="132" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">1 seg = 1</text>

<text x="706" y="104" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">cumulative score</text>
<text x="706" y="124" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">= 1 + 1 + 3 + 1</text>
<text x="706" y="144" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">= 6</text>

<text x="500" y="182" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">a higher score means more sorted runs to merge on every read, and more versions piling toward the limit</text>

</g></svg>
