<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="348px" viewBox="0 0 1000 348"><defs/><g>

<text x="500" y="26" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Where indexes live</text>
<text x="500" y="46" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">lightweight indexes ride inside the segment, the inverted index is a separate file beside it</text>

<!-- .dat -->
<rect x="60" y="86" width="400" height="226" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="80" y="110" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">r5_0.dat</text>
<path d="M 60 120 L 460 120" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<text x="80" y="140" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">columnar data, indexes built in</text>

<rect x="80" y="152" width="360" height="30" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="260" y="172" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">column pages (per column)</text>
<rect x="80" y="190" width="360" height="30" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="260" y="210" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">zone map, ordinal, short-key</text>
<rect x="80" y="228" width="360" height="30" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="260" y="248" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">bloom filter, n-gram bloom (optional)</text>
<text x="260" y="288" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">always written with the segment</text>

<!-- .idx -->
<rect x="540" y="86" width="400" height="226" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="560" y="110" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">r5_0.idx</text>
<path d="M 540 120 L 940 120" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<text x="560" y="140" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">inverted index, per indexed column</text>

<rect x="560" y="152" width="360" height="30" fill="#ecf3fd" stroke="#000000" pointer-events="all"/>
<text x="740" y="172" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">term dictionary (tis / tii)</text>
<rect x="560" y="190" width="360" height="30" fill="#ecf3fd" stroke="#000000" pointer-events="all"/>
<text x="740" y="210" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">postings list (frq / prx)</text>
<rect x="560" y="228" width="360" height="30" fill="#ecf3fd" stroke="#000000" pointer-events="all"/>
<text x="740" y="248" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">BKD tree (numeric), null bitmap</text>
<text x="740" y="288" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">written only when declared</text>

<!-- shared-prefix tie -->
<path d="M 460 199 L 540 199" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<rect x="476" y="185" width="48" height="28" fill="#fff2cc" stroke="#000000" pointer-events="all"/>
<text x="500" y="203" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">r5_0</text>

<text x="500" y="336" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">both files share the r5_0 prefix and sit side by side in the vault</text>

</g></svg>
