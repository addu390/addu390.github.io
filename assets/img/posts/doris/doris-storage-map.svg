<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="470px" viewBox="0 0 1000 470"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Where data and state live</text>

<!-- FE: catalog metadata -->
<rect x="30" y="50" width="290" height="110" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="175" y="84" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Catalog metadata</text>
<text x="175" y="108" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">FE local disk : image + edit log</text>
<rect x="45" y="120" width="125" height="24" fill="#ecf3fd" stroke="#000000" pointer-events="all"/>
<text x="107.5" y="137" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">metadata</text>
<rect x="180" y="120" width="125" height="24" fill="#ecf3fd" stroke="#000000" pointer-events="all"/>
<text x="242.5" y="137" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">durable</text>

<!-- BE: file cache -->
<rect x="355" y="50" width="290" height="110" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="500" y="84" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">File cache</text>
<text x="500" y="108" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">BE local disk : hot blocks</text>
<rect x="370" y="120" width="125" height="24" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="432.5" y="137" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">data</text>
<rect x="505" y="120" width="125" height="24" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="567.5" y="137" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">ephemeral</text>

<!-- Meta Service: metadata store -->
<rect x="680" y="50" width="290" height="110" fill="#e1d5e7" stroke="#000000" pointer-events="all"/>
<text x="825" y="84" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Metadata store</text>
<text x="825" y="108" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Meta Service : FoundationDB</text>
<rect x="695" y="120" width="125" height="24" fill="#f0eaf3" stroke="#000000" pointer-events="all"/>
<text x="757.5" y="137" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">metadata</text>
<rect x="830" y="120" width="125" height="24" fill="#f0eaf3" stroke="#000000" pointer-events="all"/>
<text x="892.5" y="137" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">durable</text>

<!-- FE note -->
<text x="175" y="188" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">(logical, not in the vault)</text>

<!-- BE -> vault -->
<path d="M 500 160 L 500 294.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 300 L 496.5 293 L 500 294.75 L 503.5 293 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="410" y="236" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">caches blocks of</text>

<!-- MS -> vault -->
<path d="M 825 160 L 825 294.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 825 300 L 821.5 293 L 825 294.75 L 828.5 293 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="723" y="236" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">describes / points into</text>

<!-- Storage vault (focus) -->
<rect x="150" y="300" width="700" height="110" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="500" y="334" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Data files : segments + index</text>
<text x="500" y="358" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage vault : object storage (S3 / HDFS / OSS / ...)</text>
<rect x="227.5" y="372" width="100" height="24" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="277.5" y="389" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">data</text>
<rect x="337.5" y="372" width="100" height="24" fill="#eaf3e9" stroke="#000000" pointer-events="all"/>
<text x="387.5" y="389" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">durable</text>
<text x="453.5" y="389" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">the single durable copy (this section)</text>

<!-- caption -->
<text x="500" y="446" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">data = the table's bytes . metadata = facts about it . durable = survives restarts . ephemeral = rebuildable</text>

</g></svg>
