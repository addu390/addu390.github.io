<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="312px" viewBox="0 0 1000 312"><defs/><g>

<text x="500" y="24" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Segment file   (one .dat)</text>

<!-- read-from-tail arrow -->
<text x="868" y="46" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">the reader starts at the tail</text>
<path d="M 930 54 L 811.25 54" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 806 54 L 813 50.5 L 811.25 54 L 813 57.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<!-- file strip -->
<rect x="40" y="62" width="920" height="60" fill="none" stroke="#000000" pointer-events="all"/>
<rect x="44" y="66" width="470" height="52" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="279" y="88" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">data pages</text>
<text x="279" y="106" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">(column by column)</text>
<rect x="518" y="66" width="118" height="52" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="577" y="88" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">index</text>
<text x="577" y="106" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">pages</text>
<rect x="640" y="66" width="120" height="52" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="700" y="88" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">short-key</text>
<text x="700" y="106" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">index</text>
<rect x="764" y="66" width="128" height="52" fill="#e1d5e7" stroke="#000000" pointer-events="all"/>
<text x="828" y="96" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">footer</text>
<rect x="896" y="66" width="60" height="52" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="926" y="96" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">D0R1</text>

<!-- read-order, left -->
<text x="56" y="172" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Reading back:</text>
<text x="56" y="198" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">1.  read the magic D0R1 at the tail</text>
<text x="56" y="220" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">2.  read the footer size, then the footer</text>
<text x="56" y="242" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">3.  use it to fetch only the pages</text>
<text x="80" y="264" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">a query actually needs</text>

<!-- footer expand, right -->
<path d="M 828 122 L 828 150" fill="none" stroke="#000000" stroke-miterlimit="10" stroke-dasharray="4 4"/>
<rect x="556" y="150" width="400" height="142" fill="none" stroke="#000000" pointer-events="all"/>
<text x="756" y="172" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">footer = the file's map</text>
<text x="572" y="198" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">per column: type, encoding, compression</text>
<text x="572" y="220" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">pointers to its pages and indexes</text>
<text x="572" y="242" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">segment zone map (min / max)</text>
<text x="572" y="264" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">short-key / primary-key index pointer</text>
<text x="572" y="286" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">num_rows, data &amp; index sizes</text>

</g></svg>
