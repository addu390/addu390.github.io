<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="500px" viewBox="0 0 1000 500"><defs/><g>

<text x="500" y="26" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Cache warm-up across compute groups (read / write separation)</text>
<text x="500" y="46" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">the write group's loads warm the read group's cache, over one shared vault</text>

<!-- Meta Service bar -->
<rect x="40" y="64" width="920" height="46" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="500" y="84" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Meta Service</text>
<text x="225" y="102" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">1  commit version vN</text>
<text x="775" y="102" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">3  pin version vN</text>

<!-- Write compute group -->
<rect x="40" y="150" width="370" height="185" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="56" y="170" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Write compute group  (ingestion)</text>
<text x="56" y="187" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">loads, compaction, schema change</text>
<rect x="56" y="198" width="158" height="32" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="135" y="218" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">BE 1</text>
<rect x="236" y="198" width="158" height="32" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="315" y="218" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">BE 2</text>
<text x="56" y="252" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">file cache  (warm for vN)</text>
<rect x="56" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="86" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="116" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="146" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="176" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="206" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="236" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="56" y="304" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">all .dat + .idx of vN are local</text>

<!-- Read compute group -->
<rect x="590" y="150" width="370" height="185" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="606" y="170" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">Read compute group  (queries)</text>
<text x="606" y="187" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">serves analytical queries at vN</text>
<rect x="606" y="198" width="158" height="32" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="685" y="218" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">BE 3</text>
<rect x="786" y="198" width="158" height="32" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="865" y="218" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">BE 4</text>
<text x="606" y="252" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">file cache  (warmed by job)</text>
<rect x="606" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="636" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="666" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="696" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="726" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="756" y="260" width="24" height="22" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<rect x="786" y="260" width="24" height="22" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="606" y="304" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">warm blocks hit, a gap misses to vault</text>

<!-- warm-up arrow (write cache -> read cache) -->
<text x="500" y="257" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">2  copy vN files</text>
<path d="M 410 271 L 584.75 271" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 590 271 L 583 267.5 L 584.75 271 L 583 274.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="500" y="289" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">(peer, else vault)</text>

<!-- write group <-> meta -->
<path d="M 225 150 L 225 115.25" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 225 110 L 221.5 117 L 225 115.25 L 228.5 117 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<!-- read group <-> meta -->
<path d="M 775 150 L 775 115.25" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 775 110 L 771.5 117 L 775 115.25 L 778.5 117 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>

<!-- Storage Vault bar -->
<rect x="40" y="378" width="920" height="50" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="500" y="400" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage Vault</text>
<text x="500" y="418" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">one shared immutable copy  -  rowset .dat / .idx files</text>

<!-- write group -> vault -->
<path d="M 225 335 L 225 372.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 225 378 L 221.5 371 L 225 372.75 L 228.5 371 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="219" y="361" fill="#000000" font-family="monospace" font-size="12px" text-anchor="end">persist</text>

<!-- vault <-> read group (miss fill) -->
<path d="M 775 340.25 L 775 372.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 775 378 L 771.5 371 L 775 372.75 L 778.5 371 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 775 335 L 771.5 342 L 775 340.25 L 778.5 342 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="781" y="361" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">miss -&gt; vault</text>

<!-- caption -->
<text x="500" y="462" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Warm-up moves the same immutable files the read group would otherwise miss, so it only changes latency.</text>
<text x="500" y="482" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">The file set comes from the pinned version, not the cache, so a cold cache only means a slower read.</text>

</g></svg>
