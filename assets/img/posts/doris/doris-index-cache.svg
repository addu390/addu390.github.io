<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="462px" viewBox="0 0 1000 462"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Indexes and data go through the same cache</text>

<!-- scan -->
<rect x="380" y="46" width="240" height="48" fill="#ffe6cc" stroke="#000000" pointer-events="all"/>
<text x="500" y="68" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Filtered scan</text>
<text x="500" y="87" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">predicate (+ MATCH)</text>

<!-- index memory -->
<rect x="120" y="132" width="340" height="46" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="290" y="160" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">in memory: searcher + index pages</text>

<!-- data memory -->
<rect x="540" y="132" width="340" height="46" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="710" y="160" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">in memory: page cache</text>

<!-- file cache (shared) -->
<rect x="120" y="212" width="760" height="58" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="500" y="236" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">BE file cache - raw blocks on local disk</text>
<text x="500" y="256" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">in-segment index pages keep their own queue budget</text>

<!-- vault -->
<rect x="120" y="312" width="760" height="58" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="500" y="336" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage Vault</text>
<text x="500" y="356" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">.dat (data + index pages)    .idx (inverted index)</text>

<!-- 1 consult index (scan -> index memory) -->
<path d="M 420 94 L 420 112 L 290 112 L 290 126.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 290 132 L 286.5 125 L 290 126.75 L 293.5 125 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="355" y="107" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">1  consult index</text>

<!-- 2 read data (data memory -> scan) -->
<path d="M 710 132 L 710 112 L 580 112 L 580 99.25" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 580 94 L 576.5 101 L 580 99.25 L 583.5 101 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="645" y="107" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">2  read data</text>

<!-- locations (index -> data) -->
<path d="M 460 155 L 534.75 155" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 540 155 L 533 158.5 L 534.75 155 L 533 151.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="500" y="148" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">locations</text>

<!-- index memory -> file cache -->
<path d="M 290 178 L 290 206.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 290 212 L 286.5 205 L 290 206.75 L 293.5 205 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="300" y="199" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">miss</text>

<!-- data memory -> file cache -->
<path d="M 710 178 L 710 206.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 710 212 L 706.5 205 L 710 206.75 L 713.5 205 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="720" y="199" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">miss</text>

<!-- file cache -> vault -->
<path d="M 500 270 L 500 306.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 312 L 496.5 305 L 500 306.75 L 503.5 305 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="510" y="293" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">miss</text>

<!-- captions -->
<text x="500" y="404" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">An index is read through the cache, not around it, so its blocks come from the cache or memory.</text>
<text x="500" y="424" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">It returns which rows and pages to read, and that data is fetched through the cache too.</text>
<text x="500" y="444" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Only a miss falls through to the vault.</text>

</g></svg>
