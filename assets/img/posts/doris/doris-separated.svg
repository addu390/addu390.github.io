<path d="M 680 300 L 680 394.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 680 300 L 676.5 307 L 680 305.25 L 683.5 307 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 680 400 L 676.5 393 L 680 394.75 L 683.5 393 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="606" y="352" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">consults meta</text>
<!-- recycler -> storage -->
<path d="M 445.25 440 L 555 440" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 440 440 L 447 436.5 L 445.25 440 L 447 443.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="500" y="432" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">delete files</text>
</g></svg>
