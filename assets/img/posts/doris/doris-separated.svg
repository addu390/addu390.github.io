<path d="M 250 128 L 250 180" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 165 180 L 345 180" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 165 180 L 165 194.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 165 200 L 161.5 193 L 165 194.75 L 168.5 193 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 345 180 L 345 194.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 345 200 L 341.5 193 L 345 194.75 L 348.5 193 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="320" y="150" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">fragments (bRPC)</text>
