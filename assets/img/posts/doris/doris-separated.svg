<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="820px" height="500px" viewBox="0 0 820 500"><defs/><g>
<!-- client -->
<rect x="175" y="20" width="150" height="34" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="250" y="41" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">SQL client</text>
<path d="M 250 54 L 250 72.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 250 78 L 246.5 71 L 250 72.75 L 253.5 71 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<!-- FE -->
<rect x="110" y="78" width="280" height="50" fill="#dae8fc" stroke="#000000" pointer-events="all"/>
<text x="250" y="107" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">FE : parse / plan / coordinate</text>
<!-- Meta Service -->
<rect x="560" y="78" width="240" height="222" fill="#e1d5e7" stroke="#000000" pointer-events="all"/>
<text x="680" y="98" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">Meta Service</text>
<text x="680" y="114" fill="#000000" font-family="monospace" font-size="12px" text-anchor="middle">(stateless, FoundationDB-backed)</text>
<rect x="575" y="128" width="210" height="150" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="585" y="146" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">stores all metadata:</text>
<text x="585" y="166" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">- tablet + rowset meta</text>
<text x="585" y="184" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">- transactions + versions</text>
<text x="585" y="202" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">- schemas + partitions</text>
<text x="585" y="220" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">- compute groups + nodes</text>
<text x="585" y="238" fill="#000000" font-family="monospace" font-size="12px" text-anchor="start">- tablet statistics</text>
<!-- FE <-> MS -->
<path d="M 395.25 103 L 554.75 103" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 390 103 L 397 99.5 L 395.25 103 L 397 106.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
