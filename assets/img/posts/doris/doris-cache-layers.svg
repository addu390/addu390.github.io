<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000px" height="340px" viewBox="0 0 1000 340"><defs/><g>

<text x="500" y="28" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Cache layers above the vault</text>

<!-- in-memory tier -->
<rect x="120" y="50" width="760" height="100" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="140" y="72" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">In memory - decoded structures</text>
<rect x="140" y="84" width="224" height="50" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="252" y="104" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Segment cache</text>
<text x="252" y="122" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">open segments</text>
<rect x="388" y="84" width="224" height="50" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="500" y="104" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Page cache</text>
<text x="500" y="122" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">decoded pages</text>
<rect x="636" y="84" width="224" height="50" fill="#fff2e5" stroke="#000000" pointer-events="all"/>
<text x="748" y="104" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Inverted cache</text>
<text x="748" y="122" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">searchers, bitmaps</text>

<!-- file cache tier -->
<rect x="120" y="172" width="760" height="50" fill="#ffffff" stroke="#000000" pointer-events="all"/>
<text x="500" y="202" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">File cache - raw blocks on local disk</text>

<!-- vault tier -->
<rect x="120" y="244" width="760" height="50" fill="#d5e8d4" stroke="#000000" pointer-events="all"/>
<text x="500" y="274" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">Storage Vault - durable bytes</text>

<!-- memory <-> disk -->
<path d="M 500 155.25 L 500 166.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 172 L 496.5 165 L 500 166.75 L 503.5 165 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 150 L 496.5 157 L 500 155.25 L 503.5 157 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="512" y="166" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">miss falls through</text>

<!-- disk <-> vault -->
<path d="M 500 227.25 L 500 238.75" fill="none" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 244 L 496.5 237 L 500 238.75 L 503.5 237 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<path d="M 500 222 L 496.5 229 L 500 227.25 L 503.5 229 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10"/>
<text x="512" y="238" fill="#000000" font-family="monospace" font-size="14px" text-anchor="start">full miss</text>

<!-- caption -->
<text x="500" y="322" fill="#000000" font-family="monospace" font-size="14px" text-anchor="middle">A read checks the in-memory caches first, then the file cache on disk, and only a full miss reaches the vault.</text>

</g></svg>
