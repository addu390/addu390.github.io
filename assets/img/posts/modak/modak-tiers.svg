<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" version="1.1" width="1120px" height="440px" viewBox="0 0 1120 440" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>

  <!-- query -->
  <rect x="400" y="24" width="320" height="46" fill="#ffffff" stroke="#000000"/>
  <text x="560" y="52" text-anchor="middle" font-size="14" font-family="monospace" fill="#000000">SELECT ... FROM events</text>

  <!-- one logical table -->
  <rect x="50" y="120" width="1020" height="230" rx="8" fill="#ffffff" stroke="#000000"/>
  <text x="60" y="108" text-anchor="start" font-size="14" font-weight="bold" fill="#000000">one logical table</text>

  <!-- cold region -->
  <rect x="80" y="150" width="560" height="170" fill="#ffffff" stroke="#000000"/>
  <text x="360" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">cold: Iceberg at snapshot S</text>

  <rect x="110" y="195" width="120" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="170" y="220" text-anchor="middle" font-size="13" fill="#000000">2021</text>
  <rect x="250" y="195" width="120" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="310" y="220" text-anchor="middle" font-size="13" fill="#000000">2022</text>
  <rect x="390" y="195" width="120" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="450" y="220" text-anchor="middle" font-size="13" fill="#000000">2023</text>
  <rect x="110" y="250" width="120" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="170" y="275" text-anchor="middle" font-size="13" fill="#000000">2024</text>
  <rect x="250" y="250" width="120" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="310" y="275" text-anchor="middle" font-size="13" fill="#000000">Jan - May</text>
  <text x="450" y="275" text-anchor="middle" font-size="14" fill="#555555">...</text>

  <!-- cut-line -->
  <line x1="685" y1="135" x2="685" y2="340" stroke="#000000" stroke-dasharray="6,4"/>
  <text x="685" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">cut-line (T)</text>

  <!-- hot region -->
  <rect x="730" y="150" width="310" height="170" fill="#ffffff" stroke="#000000"/>
  <text x="885" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">hot: Postgres heap</text>

  <rect x="760" y="200" width="110" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="815" y="225" text-anchor="middle" font-size="13" fill="#000000">June</text>
  <rect x="890" y="200" width="130" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="955" y="225" text-anchor="middle" font-size="13" fill="#000000">July (live)</text>
  <text x="885" y="280" text-anchor="middle" font-size="13" fill="#555555">indexes, transactions, OLTP</text>

  <!-- query fan-out -->
  <line x1="500" y1="70" x2="370" y2="147" stroke="#000000" marker-end="url(#arrow)"/>
  <line x1="620" y1="70" x2="875" y2="147" stroke="#000000" marker-end="url(#arrow)"/>

  <!-- captions -->
  <text x="360" y="380" text-anchor="middle" font-size="13" fill="#555555">S3, open format, any engine reads it</text>
  <text x="885" y="380" text-anchor="middle" font-size="13" fill="#555555">weeks of data, not years</text>
</svg>
