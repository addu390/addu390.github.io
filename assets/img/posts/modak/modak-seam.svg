<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" version="1.1" width="1120px" height="600px" viewBox="0 0 1120 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>

  <!-- consumers -->
  <rect x="70" y="40" width="300" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="220" y="66" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">Postgres extension</text>
  <text x="220" y="88" text-anchor="middle" font-size="13" fill="#555555">transparent reads, in the planner</text>

  <rect x="430" y="40" width="240" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="550" y="66" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">Spark connector</text>
  <text x="550" y="88" text-anchor="middle" font-size="13" fill="#555555">modak-spark</text>

  <rect x="730" y="40" width="320" height="60" fill="#ffffff" stroke="#000000" stroke-dasharray="6,4"/>
  <text x="890" y="66" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">Trino, DuckDB, Athena</text>
  <text x="890" y="88" text-anchor="middle" font-size="13" fill="#555555">planned, same recipe</text>

  <!-- pin arrows -->
  <line x1="220" y1="100" x2="430" y2="218" stroke="#000000" marker-end="url(#arrow)"/>
  <line x1="550" y1="100" x2="560" y2="216" stroke="#000000" marker-end="url(#arrow)"/>
  <line x1="890" y1="100" x2="690" y2="218" stroke="#000000" marker-end="url(#arrow)"/>
  <text x="700" y="126" text-anchor="middle" font-size="13" fill="#555555">1. pin + capture (T, S) in one transaction</text>

  <!-- seam state -->
  <rect x="310" y="220" width="500" height="130" fill="#ffffff" stroke="#000000"/>
  <text x="560" y="250" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">seam state, plain catalog tables</text>

  <rect x="330" y="275" width="110" height="50" fill="#ffffff" stroke="#000000"/>
  <text x="385" y="304" text-anchor="middle" font-size="13" fill="#000000">cut-line T</text>
  <rect x="450" y="275" width="110" height="50" fill="#ffffff" stroke="#000000"/>
  <text x="505" y="304" text-anchor="middle" font-size="13" fill="#000000">snapshot S</text>
  <rect x="570" y="275" width="110" height="50" fill="#ffffff" stroke="#000000"/>
  <text x="625" y="304" text-anchor="middle" font-size="13" fill="#000000">delta</text>
  <rect x="690" y="275" width="110" height="50" fill="#ffffff" stroke="#000000"/>
  <text x="745" y="304" text-anchor="middle" font-size="13" fill="#000000">read pins</text>

  <!-- scan arrows -->
  <line x1="430" y1="350" x2="310" y2="458" stroke="#000000" marker-end="url(#arrow)"/>
  <text x="300" y="405" text-anchor="middle" font-size="13" fill="#555555">2. scan the heap</text>

  <line x1="690" y1="350" x2="810" y2="458" stroke="#000000" marker-end="url(#arrow)"/>
  <text x="830" y="405" text-anchor="middle" font-size="13" fill="#555555">3. scan the lake at S</text>

  <!-- branches -->
  <rect x="110" y="460" width="380" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="300" y="488" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">hot branch</text>
  <text x="300" y="512" text-anchor="middle" font-size="13" fill="#555555">heap rows with tier_key &gt;= T</text>

  <rect x="630" y="460" width="380" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="820" y="488" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">cold branch</text>
  <text x="820" y="512" text-anchor="middle" font-size="13" fill="#555555">Iceberg pinned at S, delta merged</text>

  <!-- union -->
  <line x1="300" y1="530" x2="480" y2="566" stroke="#000000"/>
  <line x1="820" y1="530" x2="640" y2="566" stroke="#000000"/>
  <text x="560" y="582" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">4. union: one consistent point-in-time view</text>
</svg>
