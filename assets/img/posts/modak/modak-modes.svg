<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" version="1.1" width="1120px" height="700px" viewBox="0 0 1120 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>

  <!-- row 1: tiered -->
  <text x="50" y="40" text-anchor="start" font-size="15" font-weight="bold" fill="#000000">tiered</text>
  <rect x="50" y="52" width="1020" height="150" rx="8" fill="#ffffff" stroke="#000000"/>

  <rect x="80" y="80" width="360" height="95" fill="#ffffff" stroke="#000000"/>
  <text x="260" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Postgres</text>
  <rect x="110" y="118" width="90" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="155" y="141" text-anchor="middle" font-size="13" fill="#000000">p5</text>
  <rect x="215" y="118" width="90" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="260" y="141" text-anchor="middle" font-size="13" fill="#000000">p6</text>
  <rect x="320" y="118" width="90" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="365" y="141" text-anchor="middle" font-size="13" fill="#000000">p7</text>

  <line x1="440" y1="132" x2="670" y2="132" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="118" text-anchor="middle" font-size="13" fill="#000000">worker tiers partitions</text>
  <text x="555" y="152" text-anchor="middle" font-size="13" fill="#000000">past the cut-line</text>

  <rect x="680" y="80" width="360" height="95" fill="#ffffff" stroke="#000000"/>
  <text x="860" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Iceberg</text>
  <rect x="710" y="118" width="90" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="755" y="141" text-anchor="middle" font-size="13" fill="#000000">p0 .. p2</text>
  <rect x="815" y="118" width="90" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="860" y="141" text-anchor="middle" font-size="13" fill="#000000">p3</text>
  <rect x="920" y="118" width="90" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="965" y="141" text-anchor="middle" font-size="13" fill="#000000">p4</text>

  <text x="560" y="222" text-anchor="middle" font-size="13" fill="#000000">history leaves the heap entirely, the seam stitches every read across both tiers</text>

  <!-- row 2: mirrored -->
  <text x="50" y="278" text-anchor="start" font-size="15" font-weight="bold" fill="#000000">mirrored</text>
  <rect x="50" y="290" width="1020" height="150" rx="8" fill="#ffffff" stroke="#000000"/>

  <rect x="80" y="318" width="360" height="95" fill="#ffffff" stroke="#000000"/>
  <text x="260" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Postgres</text>
  <rect x="110" y="356" width="300" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="260" y="379" text-anchor="middle" font-size="13" fill="#000000">full table</text>

  <line x1="440" y1="370" x2="670" y2="370" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="356" text-anchor="middle" font-size="13" fill="#000000">CDC trails every change</text>

  <rect x="680" y="318" width="360" height="95" fill="#ffffff" stroke="#000000"/>
  <text x="860" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Iceberg</text>
  <rect x="710" y="356" width="300" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="860" y="379" text-anchor="middle" font-size="13" fill="#000000">full copy</text>

  <text x="560" y="460" text-anchor="middle" font-size="13" fill="#000000">Postgres keeps everything and stays fully writable, the lake is a live analytical copy</text>

  <!-- row 3: mirrored + heap retention -->
  <text x="50" y="516" text-anchor="start" font-size="15" font-weight="bold" fill="#000000">mirrored + heap retention</text>
  <rect x="50" y="528" width="1020" height="150" rx="8" fill="#ffffff" stroke="#000000"/>

  <rect x="80" y="556" width="360" height="95" fill="#ffffff" stroke="#000000"/>
  <text x="260" y="578" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Postgres</text>
  <rect x="110" y="594" width="140" height="36" fill="#ffffff" stroke="#000000" stroke-dasharray="5,4"/>
  <text x="180" y="617" text-anchor="middle" font-size="13" fill="#000000">history shed</text>
  <rect x="270" y="594" width="140" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="340" y="617" text-anchor="middle" font-size="13" fill="#000000">recent window</text>

  <line x1="440" y1="608" x2="670" y2="608" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="594" text-anchor="middle" font-size="13" fill="#000000">CDC trails every change</text>

  <rect x="680" y="556" width="360" height="95" fill="#ffffff" stroke="#000000"/>
  <text x="860" y="578" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Iceberg</text>
  <rect x="710" y="594" width="300" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="860" y="617" text-anchor="middle" font-size="13" fill="#000000">full copy</text>

  <text x="560" y="698" text-anchor="middle" font-size="13" fill="#000000">the lake holds the full history, the heap sheds what it no longer needs hot, reads still span both</text>
</svg>
