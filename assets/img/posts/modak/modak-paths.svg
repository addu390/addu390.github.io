<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light;" version="1.1" width="1120px" height="560px" viewBox="0 0 1120 560" font-family="Helvetica, Arial, sans-serif">

  <!-- column headers: destinations -->
  <rect x="340" y="40" width="340" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="510" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">Analytical engine</text>
  <text x="510" y="93" text-anchor="middle" font-size="13" fill="#555555">ClickHouse, Doris, Snowflake, BigQuery</text>

  <rect x="700" y="40" width="340" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="870" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">Open table format</text>
  <text x="870" y="93" text-anchor="middle" font-size="13" fill="#555555">Iceberg, Delta on object storage</text>

  <!-- row labels: pipes -->
  <rect x="60" y="130" width="260" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="190" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">Direct ingest</text>
  <text x="190" y="191" text-anchor="middle" font-size="13" fill="#555555">the application writes there</text>

  <rect x="60" y="240" width="260" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="190" y="278" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">CDC</text>
  <text x="190" y="301" text-anchor="middle" font-size="13" fill="#555555">replay the Postgres WAL</text>

  <rect x="60" y="350" width="260" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="190" y="388" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">Batch ETL</text>
  <text x="190" y="411" text-anchor="middle" font-size="13" fill="#555555">scheduled loads</text>

  <!-- cells: direct ingest -->
  <rect x="340" y="130" width="340" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="510" y="168" text-anchor="middle" font-size="13" fill="#000000">events straight into the store</text>
  <text x="510" y="191" text-anchor="middle" font-size="13" fill="#555555">fresh, but a second system of record</text>

  <rect x="700" y="130" width="340" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="870" y="168" text-anchor="middle" font-size="13" fill="#000000">streaming commits to the lake</text>
  <text x="870" y="191" text-anchor="middle" font-size="13" fill="#555555">fresh, small files from day one</text>

  <!-- cells: cdc -->
  <rect x="340" y="240" width="340" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="510" y="278" text-anchor="middle" font-size="13" fill="#000000">replicate into the store</text>
  <text x="510" y="301" text-anchor="middle" font-size="13" fill="#555555">minutes behind, boundary untracked</text>

  <rect x="700" y="240" width="340" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="870" y="278" text-anchor="middle" font-size="13" fill="#000000">Debezium into Iceberg</text>
  <text x="870" y="301" text-anchor="middle" font-size="13" fill="#555555">minutes behind, small files, seam is yours</text>

  <!-- cells: batch -->
  <rect x="340" y="350" width="340" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="510" y="388" text-anchor="middle" font-size="13" fill="#000000">warehouse loads</text>
  <text x="510" y="411" text-anchor="middle" font-size="13" fill="#555555">simple, a day behind</text>

  <rect x="700" y="350" width="340" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="870" y="388" text-anchor="middle" font-size="13" fill="#000000">lake loads</text>
  <text x="870" y="411" text-anchor="middle" font-size="13" fill="#555555">simple, a day behind</text>

  <!-- bundled option -->
  <rect x="60" y="470" width="980" height="60" fill="#ffffff" stroke="#000000" stroke-dasharray="6,4"/>
  <text x="550" y="496" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Zero-ETL and bundled platforms</text>
  <text x="550" y="517" text-anchor="middle" font-size="13" fill="#555555">a cell of this grid, managed by the vendor: Aurora to Redshift, Lakebase</text>
</svg>
